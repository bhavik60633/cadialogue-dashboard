name: Finance Blog Pipeline

on:
  schedule:
    # 01:30 UTC = 07:00 AM IST (UTC+5:30) every day
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      force_topic:
        description: 'Override topic text (leave blank to auto-research)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # 4 hours: covers 30-min topic window + 2-hour approval window + pipeline time
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run finance pipeline
        env:
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY:                  ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN:           ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:             ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID:          ${{ secrets.TELEGRAM_CHANNEL_ID }}
          WP_URL:                       ${{ secrets.WP_URL }}
          WP_USERNAME:                  ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:              ${{ secrets.WP_APP_PASSWORD }}
          WP_SEO_PLUGIN:                ${{ secrets.WP_SEO_PLUGIN }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          INDEXNOW_KEY:                 ${{ secrets.INDEXNOW_KEY }}
          TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:        ${{ secrets.TWITTER_ACCESS_SECRET }}
          FORCE_TOPIC:                  ${{ github.event.inputs.force_topic }}
        run: python -m pipeline.main

      - name: Commit updated run state
        # Always runs — even if pipeline fails — to persist state
        if: always()
        run: |
          git config user.name "Finance Pipeline Bot"
          git config user.email "pipeline@noreply.github.com"
          git add pipeline/state/runs.json
          git diff --staged --quiet || \
            git commit -m "chore: update pipeline run state [skip ci]" && \
            git push
